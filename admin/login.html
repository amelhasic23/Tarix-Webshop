<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tarix WebShop</title>
    <link rel="icon" href="../Images/logo/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="../Images/logo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 data-translate="loginTitle">Tarix Admin</h1>
                <p data-translate="loginSubtitle">Sign in to manage your store</p>
                <div class="login-lang-switcher">
                    <select id="loginLangSelect" aria-label="Select language">
                        <option value="en">EN</option>
                        <option value="de">DE</option>
                        <option value="bs">BS</option>
                    </select>
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username" data-translate="usernameLabel">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" data-translate="passwordLabel">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginText" data-translate="signInBtn">Sign In</span>
                    <span id="loginLoader" class="loader" style="display: none;"></span>
                </button>
            </form>

            <div class="login-footer">
                <p data-translate="loginCopyright">&copy; 2026 Tarix. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
